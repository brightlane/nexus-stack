name: Vulture 10K Autonomous Engine

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'  # Midnight daily execution
  workflow_dispatch:      # Manual trigger button

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 📦 Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install requests tweepy

      - name: 🛠️ Run Vulture Page Generator
        run: python scripts/vulture_gen.py

      - name: 📝 Run Chameleon Content Stitcher
        run: python scripts/vulture_stitcher.py

      - name: 📅 Run Daily Update Protocol
        run: python scripts/daily_blog.py

      - name: 🗺️ Refresh Global Sitemap
        run: python scripts/generate_sitemap.py

      - name: 📡 AI Ecosystem Broadcast
        env:
          AYRSHARE_API_KEY: ${{ secrets.AYRSHARE_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python scripts/ai_broadcaster.py

      - name: 🚀 Sync and Force-Deploy Updates
        run: |
          git config --global user.name "Nexus-Stack-Bot"
          git config --global user.email "bot@nexusstack.io"
          
          # Stage all generated content
          git add .
          
          # Commit locally - skip if nothing changed
          git commit -m "Vulture 10K Refresh: $(date +'%Y-%m-%d %H:%M')" || exit 0
          
          # Force resolution: The Bot's new content always "Wins" conflicts
          git pull origin main --rebase -X ours
          
          # Push to the live repository
          git push origin main
