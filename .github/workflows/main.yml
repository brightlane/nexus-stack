name: Nexus Stack Autonomous Engine

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          # Cache removed to prevent the "No file matched" error

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tweepy

      - name: 🛠️ Execute Vulture 10K Engine
        run: python scripts/vulture_gen.py

      - name: 📝 Execute Chameleon Blog Stitcher
        run: python scripts/vulture_stitcher.py

      - name: 📅 Generate Daily Protocol Update
        run: python scripts/daily_blog.py

      - name: 🗺️ Refresh Global Sitemap
        run: python scripts/generate_sitemap.py

      - name: 📡 Broadcast to AI Ecosystems
        env:
          AYRSHARE_API_KEY: ${{ secrets.AYRSHARE_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python scripts/ai_broadcaster.py

      - name: 🚀 Commit and Push All Updates
        run: |
          git config --global user.name "Nexus-Stack-Bot"
          git config --global user.email "bot@nexusstack.io"
          git add .
          git commit -m "Automated Content Refresh: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
